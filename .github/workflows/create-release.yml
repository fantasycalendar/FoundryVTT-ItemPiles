name: Create Release

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'changelog.md'
      - 'module.json'
      - '.github/workflows/create-release.yml'
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and body from changelog
        id: changelog
        run: |
          VERSION=$(awk '/^## Version / { sub(/^## Version /, ""); print; exit }' changelog.md)

          if [ -z "$VERSION" ]; then
            echo "::error::Could not find a '## Version X.Y.Z' header in changelog.md"
            exit 1
          fi

          BODY=$(awk '
            /^## Version / {
              if (seen) exit
              seen = 1
              next
            }
            seen { print }
          ' changelog.md)

          BODY=$(echo "$BODY" | sed -e '/./,$!d' | sed -e :a -e '/^$/{$d;N;ba' -e '}')

          if [ -z "$BODY" ]; then
            BODY="Release $VERSION"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          {
            echo 'body<<CHANGELOG_EOF'
            echo "$BODY"
            echo 'CHANGELOG_EOF'
          } >> $GITHUB_OUTPUT

          echo "Version: $VERSION"
          echo "Body length: $(echo -n "$BODY" | wc -c) characters"

      - name: Check if release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.changelog.outputs.version }}"
          if gh release view "$VERSION" --json tagName >/dev/null 2>&1; then
            echo "Release $VERSION already exists, skipping creation."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.changelog.outputs.version }}
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
          RELEASE_BRANCH: ${{ github.ref_name }}
        run: |
          printf '%s' "$RELEASE_BODY" > release-notes.md

          gh release create "$RELEASE_VERSION" \
            --target "$RELEASE_BRANCH" \
            --title "$RELEASE_VERSION" \
            --notes-file release-notes.md

          echo "Release published for version $RELEASE_VERSION"
          echo "View at: https://github.com/${{ github.repository }}/releases/tag/$RELEASE_VERSION"
